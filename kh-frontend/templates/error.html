{% extends "base.html" %}
{% block title %}Error — Knowledge Hub Monitor{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-12 col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-body text-center py-5">
                <i class="bi bi-exclamation-triangle-fill text-danger fs-1 d-block mb-3"></i>
                <h5 class="fw-bold mb-3">Monitoring API Unreachable</h5>
                <p class="text-muted mb-4">{{ error }}</p>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline-danger">
                    <i class="bi bi-arrow-clockwise me-1"></i>Retry
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
