<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Knowledge Hub Monitor{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

    <!-- Custom styles -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">
            <i class="bi bi-activity me-2"></i>Knowledge Hub Monitor
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}"
                       href="{{ url_for('dashboard') }}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'metrics' %}active{% endif %}"
                       href="{{ url_for('metrics') }}">
                        <i class="bi bi-table me-1"></i>Metrics
                    </a>
                </li>
            </ul>

            <!-- User placeholder — will be replaced by Entra ID identity in Task 2 -->
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <span class="navbar-text text-secondary">
                        <i class="bi bi-person-circle me-1"></i>
                        {% if current_user is defined and current_user %}
                            {{ current_user.name }}
                        {% else %}
                            Not signed in
                        {% endif %}
                    </span>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main content -->
<main class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="footer mt-auto py-3 bg-dark text-center">
    <span class="text-secondary small">
        Knowledge Hub &mdash; Monitoring Dashboard &mdash; CS3
    </span>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}{% endblock %}

</body>
</html>
