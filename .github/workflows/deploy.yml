name: Build, Scan and Deploy kh-frontend

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-scan-push:
    name: Build, Scan and Push Image
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Authenticate to Azure using service principal credentials
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      # Step 3 — Authenticate Docker to ACR using the Azure CLI session
      - name: Login to ACR
        run: az acr login --name khregistryspaincentral

      # Step 4 — Build the kh-frontend Docker image and tag it with
      #           both the short commit SHA (immutable) and latest
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/kh-frontend:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/kh-frontend:latest \
            ./kh-frontend

      # Step 5 — Scan the built image for vulnerabilities using Trivy
      #           Pipeline fails if any CRITICAL CVEs are found
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/kh-frontend:latest
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      # Step 6 — Push both tags to ACR only if Trivy scan passed
      - name: Push image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/kh-frontend:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/kh-frontend:latest

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-scan-push

    steps:
      # Step 1 — Authenticate to Azure
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      # Step 2 — Update the Container App to use the newly pushed image
      #           Uses the SHA tag for explicit, traceable version control
      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name kh-frontend-app \
            --resource-group rg-kh-workload-spaincentral \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/kh-frontend:${{ github.sha }}

      # Step 3 — Output the public URL for verification
      - name: Get deployment URL
        run: |
          echo "Deployed to: https://kh-frontend-app.whiteplant-d6eac0da.spaincentral.azurecontainerapps.io"